name: Github Actions FGC

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: 🔨 Build da aplicação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 🔧 Restaurar e compilar solução
        run: dotnet build src/Processador.Doacoes.Worker.Service/Processador.Doacoes.Worker.Service.sln --configuration Release

  test:
    name: ✅ Testes Unitários
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Executar testes
        run: |
          echo "Nenhum teste configurado"

  push:
    name: 🚀 Docker Build & Publish
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🔐 Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🐳 Build e Push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: ./src/Processador.Doacoes.Worker.Service
          file: ./src/Processador.Doacoes.Worker.Service/Dockerfile
          push: true
          tags:  DOCKER_USERNAME/processador-doacoes:latest